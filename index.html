<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGMA SHOWCASE</title>
    <style>
        :root {
            /* Pastel desert meets northeast forest palette */
            --sage-green: #A8B5A2;
            --moss-green: #8A9A7B;
            --sand-beige: #E8DAB2;
            --dusty-rose: #D9B8A7;
            --warm-cream: #F2E8CF;
            --deep-pine: #5D7555;
            --sunset-peach: #F4C7AB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--warm-cream) 0%, var(--sand-beige) 50%, var(--sage-green) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--deep-pine);
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 0 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            background: linear-gradient(45deg, var(--moss-green), var(--dusty-rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            opacity: 0.8;
            color: var(--deep-pine);
        }

        .upload-area {
            width: min(90vw, 600px);
            height: min(60vh, 500px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 3px dashed var(--moss-green);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--deep-pine);
            background: rgba(248, 232, 207, 0.95);
            transform: translateY(-4px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        .upload-icon {
            font-size: clamp(4rem, 12vw, 8rem);
            color: var(--sage-green);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .upload-area.drag-over .upload-icon {
            color: var(--deep-pine);
            transform: scale(1.1);
        }

        .upload-text {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 500;
            color: var(--deep-pine);
            margin-bottom: 1rem;
            text-align: center;
        }

        .upload-subtext {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--sage-green);
            opacity: 0.7;
            text-align: center;
            max-width: 80%;
        }

        .browse-btn {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--sunset-peach), var(--dusty-rose));
            color: var(--deep-pine);
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(244, 199, 171, 0.4);
        }

        .browse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(244, 199, 171, 0.6);
        }

        #image-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        #image-preview.show {
            opacity: 1;
        }

        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .fullscreen-overlay.show {
            display: flex;
        }

        .fullscreen-img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .header {
                margin-bottom: 2rem;
            }
            
            .upload-area {
                margin: 1rem;
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>SIGMA SHOWCASE</h1>
        <p class="subtitle">Drag & drop your masterpiece</p>
    </header>

    <main>
        <div class="upload-area" id="uploadArea">
            <img id="image-preview" src="" alt="Preview">
            <div class="upload-icon">📷</div>
            <div class="upload-text">Drop your image here</div>
            <div class="upload-subtext">
                or click to browse and select from your files<br>
                Supports JPG, PNG, GIF, WebP
            </div>
            <button class="browse-btn">Browse Files</button>
        </div>
    </main>

    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <img class="fullscreen-img" id="fullscreenImg" src="" alt="Fullscreen">
        <button class="close-btn" id="closeBtn">×</button>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imagePreview = document.getElementById('image-preview');
        const fullscreenOverlay = document.getElementById('fullscreenOverlay');
        const fullscreenImg = document.getElementById('fullscreenImg');
        const closeBtn = document.getElementById('closeBtn');
        const browseBtn = document.querySelector('.browse-btn');

        // Drag and drop events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            uploadArea.classList.add('drag-over');
        }

        function unhighlight(e) {
            uploadArea.classList.remove('drag-over');
        }

        uploadArea.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        // Browse button and click to upload
        uploadArea.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => handleFiles(e.target.files);
            input.click();
        });

        browseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => handleFiles(e.target.files);
            input.click();
        });

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        imagePreview.src = e.target.result;
                        imagePreview.classList.add('show');
                    };
                    reader.readAsDataURL(file);
                }
            }
        }

        // Fullscreen functionality
        imagePreview.addEventListener('click', openFullscreen);
        imagePreview.addEventListener('load', () => {
            if (imagePreview.src) {
                imagePreview.style.cursor = 'zoom-in';
            }
        });

        function openFullscreen() {
            if (imagePreview.src) {
                fullscreenImg.src = imagePreview.src;
                fullscreenOverlay.classList.add('show');
                document.body.style.overflow = 'hidden';
            }
        }

        closeBtn.addEventListener('click', closeFullscreen);
        fullscreenOverlay.addEventListener('click', (e) => {
            if (e.target === fullscreenOverlay) closeFullscreen();
        });

        function closeFullscreen() {
            fullscreenOverlay.classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && fullscreenOverlay.classList.contains('show')) {
                closeFullscreen();
            }
        });
    </script>
</body>
</html>
