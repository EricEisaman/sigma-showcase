<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIGMA SHOWCASE</title>
    <style>
        :root {
            --bubblegum-pink: #FF69B4;
            --tropical-turquoise: #20B2AA;
            --sunset-coral: #FF7F50;
            --mango-orange: #FFAF33;
            --coconut-cream: #FFF8DC;
            --palm-green: #32CD32;
            --hot-pink: #FF1493;
            --ocean-blue: #00CED1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--coconut-cream) 0%, var(--bubblegum-pink) 20%, var(--tropical-turquoise) 50%, var(--sunset-coral) 100%);
            background-size: 400% 400%;
            animation: beachWave 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--hot-pink);
            overflow-x: hidden;
        }

        @keyframes beachWave {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 0 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            background: linear-gradient(45deg, var(--bubblegum-pink), var(--tropical-turquoise), var(--mango-orange), var(--hot-pink));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            background: linear-gradient(45deg, var(--sunset-coral), var(--palm-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.9;
        }

        .upload-area {
            width: min(90vw, 600px);
            height: min(60vh, 500px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border: 4px dashed var(--tropical-turquoise);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s;
            cursor: pointer;
            position: relative;
            box-shadow: 0 25px 50px rgba(255, 105, 180, 0.3);
            overflow: hidden;
        }

        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--hot-pink);
            transform: scale(1.02) rotate(1deg);
        }

        .upload-icon {
            font-size: clamp(5rem, 14vw, 9rem);
            color: var(--bubblegum-pink);
            margin-bottom: 1.5rem;
        }

        .upload-text {
            font-size: clamp(1.3rem, 4.5vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(45deg, var(--mango-orange), var(--sunset-coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            text-align: center;
        }

        .upload-subtext {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--tropical-turquoise);
            opacity: 0.85;
            text-align: center;
            max-width: 85%;
            font-weight: 500;
        }

        .browse-btn {
            margin-top: 2.5rem;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, var(--bubblegum-pink), var(--hot-pink));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 12px 40px rgba(255, 105, 180, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .browse-btn:hover {
            transform: translateY(-5px) scale(1.05);
        }

        /* Upload‑area image preview */
        #image-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
            cursor: pointer;
        }

        #image-preview.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>SIGMA SHOWCASE</h1>
        <p class="subtitle">🌴 Drag & drop your beach masterpiece 🏖️</p>
    </header>

    <main>
        <div class="upload-area" id="uploadArea">
            <img id="image-preview" src="" alt="Preview">
            <div class="upload-icon">🏝️</div>
            <div class="upload-text">Drop your image here</div>
            <div class="upload-subtext">
                or click/tap to browse your tropical collection<br>
                JPG, PNG, GIF, WebP • Tap/Click image for TRUE FULLSCREEN
            </div>
            <button class="browse-btn">Choose Files</button>
        </div>
    </main>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imagePreview = document.getElementById('image-preview');

        // Drag and drop helpers
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('drag-over');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('drag-over');
            }, false);
        });

        uploadArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            handleFiles(dt.files);
        });

        // Upload click handler
        uploadArea.addEventListener('click', (e) => {
            if (e.target === imagePreview && imagePreview.classList.contains('show')) {
                enterFullscreen(imagePreview);
                return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (ev) => handleFiles(ev.target.files);
            input.click();
        });

        document.querySelector('.browse-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (ev) => handleFiles(ev.target.files);
            input.click();
        });

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        imagePreview.src = e.target.result;
                        imagePreview.classList.add('show');
                    };
                    reader.readAsDataURL(file);
                }
            }
        }

        // Use the real Fullscreen API to hide browser chrome
        function enterFullscreen(elem) {
            if (!elem.src || !elem.complete) return;

            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // Optional: handle fullscreen exit (ESC or native button)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                console.log('Exited fullscreen');
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement) {
                console.log('Exited fullscreen (webkit)');
            }
        });
    </script>
</body>
</html>
