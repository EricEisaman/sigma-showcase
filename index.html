<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIGMA SHOWCASE</title>
    <style>
        :root {
            --bubblegum-pink: #FF69B4;
            --tropical-turquoise: #20B2AA;
            --sunset-coral: #FF7F50;
            --mango-orange: #FFAF33;
            --coconut-cream: #FFF8DC;
            --palm-green: #32CD32;
            --hot-pink: #FF1493;
            --ocean-blue: #00CED1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--coconut-cream) 0%, var(--bubblegum-pink) 20%, var(--tropical-turquoise) 50%, var(--sunset-coral) 100%);
            background-size: 400% 400%;
            animation: beachWave 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--hot-pink);
            overflow-x: hidden;
        }

        @keyframes beachWave {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 0 2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            background: linear-gradient(45deg, var(--bubblegum-pink), var(--tropical-turquoise), var(--mango-orange), var(--hot-pink));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 3s ease infinite;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
        }

        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            background: linear-gradient(45deg, var(--sunset-coral), var(--palm-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.9;
        }

        .upload-area {
            width: min(90vw, 600px);
            height: min(60vh, 500px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border: 4px dashed var(--tropical-turquoise);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            position: relative;
            box-shadow: 0 25px 50px rgba(255, 105, 180, 0.3);
            overflow: hidden;
        }

        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--hot-pink);
            background: rgba(255, 248, 220, 0.98);
            transform: scale(1.02) rotate(1deg);
            box-shadow: 0 35px 70px rgba(255, 105, 180, 0.4);
        }

        .upload-icon {
            font-size: clamp(5rem, 14vw, 9rem);
            color: var(--bubblegum-pink);
            margin-bottom: 1.5rem;
            transition: all 0.4s ease;
            filter: drop-shadow(0 0 20px currentColor);
            z-index: 2;
        }

        .upload-area.drag-over .upload-icon {
            color: var(--hot-pink);
            transform: scale(1.2) rotate(10deg);
        }

        .upload-text {
            font-size: clamp(1.3rem, 4.5vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(45deg, var(--mango-orange), var(--sunset-coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            text-align: center;
            z-index: 2;
        }

        .upload-subtext {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--tropical-turquoise);
            opacity: 0.85;
            text-align: center;
            max-width: 85%;
            font-weight: 500;
            z-index: 2;
        }

        .browse-btn {
            margin-top: 2.5rem;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, var(--bubblegum-pink), var(--hot-pink));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 12px 40px rgba(255, 105, 180, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
        }

        .browse-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.7);
        }

        #image-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
            cursor: pointer;
        }

        #image-preview.show {
            opacity: 1;
        }

        /* FULL SIGMA BUTTON */
        .full-sigma-btn {
            margin-top: 2rem;
            padding: 1.5rem 4rem;
            background: linear-gradient(135deg, var(--hot-pink), var(--mango-orange), var(--bubblegum-pink));
            color: white;
            border: 4px solid transparent;
            border-radius: 60px;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 
                0 20px 60px rgba(255, 20, 147, 0.6),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            pointer-events: none;
        }

        .full-sigma-btn.active {
            opacity: 1;
            pointer-events: all;
        }

        .full-sigma-btn:hover:not(:disabled) {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 
                0 35px 80px rgba(255, 20, 147, 0.8),
                inset 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* DEDICATED FULLSCREEN IMAGE CONTAINER - ONLY the image + black background */
        #sigma-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #sigma-fullscreen.show {
            opacity: 1;
            visibility: visible;
        }

        #sigma-image {
            max-width: 98vw;
            max-height: 98vh;
            width: auto;
            height: auto;
            object-fit: contain;
            cursor: pointer;
        }

        /* Fullscreen API styles for the image container */
        #sigma-fullscreen:fullscreen,
        #sigma-fullscreen:-webkit-full-screen {
            opacity: 1 !important;
            visibility: visible !important;
        }

        #sigma-fullscreen:fullscreen #sigma-image,
        #sigma-fullscreen:-webkit-full-screen #sigma-image {
            max-width: 100vw !important;
            max-height: 100vh !important;
            object-fit: contain !important;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>SIGMA SHOWCASE</h1>
        <p class="subtitle">🌴 Drag & drop your beach masterpiece 🏖️</p>
    </header>

    <main>
        <div class="upload-area" id="uploadArea">
            <img id="image-preview" src="" alt="Preview">
            <div class="upload-icon">🏝️</div>
            <div class="upload-text">Drop your image here</div>
            <div class="upload-subtext">
                or click/tap to browse your tropical collection<br>
                JPG, PNG, GIF, WebP • Upload then hit FULL SIGMA!
            </div>
            <button class="browse-btn">Choose Files</button>
        </div>
    </main>

    <!-- FULL SIGMA BUTTON -->
    <button id="fullSigmaBtn" class="full-sigma-btn" disabled>FULL SIGMA</button>

    <!-- DEDICATED FULLSCREEN IMAGE ONLY -->
    <div id="sigma-fullscreen">
        <img id="sigma-image" src="" alt="Sigma Fullscreen">
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imagePreview = document.getElementById('image-preview');
        const fullSigmaBtn = document.getElementById('fullSigmaBtn');
        const sigmaFullscreen = document.getElementById('sigma-fullscreen');
        const sigmaImage = document.getElementById('sigma-image');

        let currentImageSrc = '';

        // Drag and drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => uploadArea.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => uploadArea.classList.remove('drag-over'), false);
        });

        uploadArea.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));

        // File upload
        uploadArea.addEventListener('click', (e) => {
            if (e.target === imagePreview && imagePreview.classList.contains('show')) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (ev) => handleFiles(ev.target.files);
            input.click();
        });

        document.querySelector('.browse-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (ev) => handleFiles(ev.target.files);
            input.click();
        });

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        currentImageSrc = e.target.result;
                        imagePreview.src = currentImageSrc;
                        imagePreview.classList.add('show');
                        sigmaImage.src = currentImageSrc;
                        
                        fullSigmaBtn.disabled = false;
                        fullSigmaBtn.classList.add('active');
                    };
                    reader.readAsDataURL(file);
                }
            }
        }

        // FULL SIGMA BUTTON - Clean image-only fullscreen
        fullSigmaBtn.addEventListener('click', async () => {
            if (!currentImageSrc) return;

            // First try native fullscreen on image container
            try {
                if (sigmaFullscreen.requestFullscreen) {
                    await sigmaFullscreen.requestFullscreen();
                } else if (sigmaFullscreen.webkitRequestFullscreen) {
                    await sigmaFullscreen.webkitRequestFullscreen();
                }
                return; // Success - let fullscreen handle it
            } catch (err) {
                console.log('Native fullscreen blocked, using overlay');
            }

            // Fallback: show overlay
            sigmaFullscreen.classList.add('show');
            document.body.style.overflow = 'hidden';
        });

        // Exit fullscreen (click anywhere or ESC)
        sigmaFullscreen.addEventListener('click', () => {
            sigmaFullscreen.classList.remove('show');
            document.body.style.overflow = '';
            
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sigmaFullscreen.classList.contains('show')) {
                sigmaFullscreen.classList.remove('show');
                document.body.style.overflow = '';
                if (document.exitFullscreen) document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
